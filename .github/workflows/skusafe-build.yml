name: skusafe-build

# Cheap on-push validation: confirms the parser/formatter changes still
# compile and all biome_html_{parser,formatter} tests pass. Skipped on the
# `main` mirror branch (which tracks upstream) and on release tags
# (covered by skusafe-release).

on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - 'skusafe-v*'
  pull_request:
    branches:
      - 'fix/**'
      - 'skusafe/**'

concurrency:
  group: skusafe-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  html-tests:
    # Switch runners via RUNNER_PROVIDER repo variable: 'blacksmith' or default.
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' && 'blacksmith-8vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: skusafe-build-linux-x64

      - run: cargo test -p biome_html_parser -p biome_html_formatter

  cli-build-check:
    # Switch runners via RUNNER_PROVIDER repo variable: 'blacksmith' or default.
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' && 'blacksmith-8vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: skusafe-build-linux-x64

      # Faster than --release; we only want to confirm the workspace links.
      - run: cargo check -p biome_cli
