name: Lint rule docs
on:
  merge_group:
  pull_request:
    branches:
      - main
      - next
    paths:
      # Run only when we change the analyze crates
      - "**/biome_*_analyze/**/*.rs"
      - "**/biome_analyze/**/*.rs"
  push:
    branches:
      - main
      - next
    paths:
      # Run only when we change the analyze crates
      - "**/biome_*_analyze/**/*.rs"
      - "**/biome_analyze/**/*.rs"


# Cancel jobs when the PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  RUST_LOG: info
  RUST_BACKTRACE: 1
  RUSTUP_WINDOWS_PATH_ADD_BIN: 1

jobs:
  rule_docs:
    name: Validate rules documentation
    runs-on: depot-ubuntu-24.04-arm-16
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install toolchain
        uses: moonrepo/setup-rust@abb2d32350334249b178c401e5ec5836e0cd88d3 # v1.3.0
        with:
          cache-base: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run rules check
        run: cargo run -p rules_check
