name: skusafe-release

# Builds the patched biome binaries for the SKUSafe platform matrix and
# publishes them as .tgz assets on a GitHub Release. Consumers reference
# the assets via direct tarball URLs in package.json overrides.
#
# Triggers:
#   - Tag push:        skusafe-v*           (e.g. skusafe-v2.4.14-skusafe.1)
#   - Manual dispatch: provide `version`    (e.g. 2.4.14-skusafe.1)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.4.14-skusafe.1) — without the skusafe-v tag prefix'
        required: true
  push:
    tags:
      - 'skusafe-v*'

permissions:
  contents: write   # required for softprops/action-gh-release

jobs:
  resolve-version:
    # Switch runners via RUNNER_PROVIDER repo variable: 'blacksmith' or default to standard GH-hosted.
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#skusafe-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            blacksmith_os: blacksmith-8vcpu-macos-latest
            target: aarch64-apple-darwin
            pkg: cli-darwin-arm64
          - os: ubuntu-24.04
            blacksmith_os: blacksmith-8vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
            pkg: cli-linux-x64
          # Add more platforms here as needed:
          #   { os: macos-14, blacksmith_os: blacksmith-8vcpu-macos-latest, target: x86_64-apple-darwin, pkg: cli-darwin-x64 }
          #   { os: ubuntu-24.04-arm, blacksmith_os: blacksmith-8vcpu-ubuntu-2404-arm, target: aarch64-unknown-linux-gnu, pkg: cli-linux-arm64 }
    # 8 vCPU is a sweet spot for Rust release builds; bigger runners help.
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' && matrix.blacksmith_os || matrix.os }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
      BIOME_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: skusafe-${{ matrix.target }}

      - name: Bump versions
        run: ./scripts/skusafe-prepare-release.sh "$VERSION"

      - name: Build biome_cli
        run: cargo build --release --target ${{ matrix.target }} -p biome_cli

      - name: Stage binary into platform package
        run: |
          cp "target/${{ matrix.target }}/release/biome" "packages/@biomejs/${{ matrix.pkg }}/biome"
          chmod +x "packages/@biomejs/${{ matrix.pkg }}/biome"

      - name: npm pack
        working-directory: packages/@biomejs/${{ matrix.pkg }}
        run: |
          # `files` field is missing on platform package.jsons upstream — they
          # rely on npm's default which includes everything. We add the binary
          # by name to be explicit.
          npm pack
          ls -la *.tgz

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.pkg }}
          path: packages/@biomejs/${{ matrix.pkg }}/*.tgz

  pack-wrapper:
    needs: resolve-version
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Bump versions
        run: ./scripts/skusafe-prepare-release.sh "$VERSION"

      - name: npm pack wrapper
        working-directory: packages/@biomejs/biome
        run: |
          npm pack
          ls -la *.tgz

      - uses: actions/upload-artifact@v5
        with:
          name: biome-wrapper
          path: packages/@biomejs/biome/*.tgz

      # Schema is shipped alongside the tarballs so consumers can point
      # biome.json `$schema` at a stable Release URL (Content-Type:
      # application/json). The raw.githubusercontent.com URL on the tag
      # also works as a fallback.
      - name: Stage schema
        run: cp packages/@biomejs/biome/configuration_schema.json schema.json

      - uses: actions/upload-artifact@v5
        with:
          name: schema
          path: schema.json

  release:
    needs: [resolve-version, build, pack-wrapper]
    runs-on: ${{ vars.RUNNER_PROVIDER == 'blacksmith' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-24.04' }}
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: skusafe-v${{ env.VERSION }}
          name: skusafe-v${{ env.VERSION }}
          files: |
            dist/*.tgz
            dist/schema.json
          generate_release_notes: true
          # If the workflow was dispatched manually, create the tag too.
          # On tag-push triggers this is a no-op.
          target_commitish: ${{ github.sha }}
          # SKUome is a fork, and GitHub forces forks' GITHUB_TOKEN to be
          # read-only — so creating a Release fails with 403 unless we use
          # a fine-grained PAT stored as RELEASE_TOKEN. Falls back to
          # GITHUB_TOKEN for ergonomics during local testing; the secret
          # has to be set on the repo for tag-push releases to publish.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
