name: Ocean fork — build platform tarballs

# Fork-local release builder. Compiles the biome CLI for one or more target
# platforms from a feature branch and uploads the resulting platform packages
# (one `.tgz` per target) as artifacts. The artifacts are then attached to a
# GitHub release on this fork so Ocean can pin via `pnpm.overrides`.
#
# Does NOT publish to npm. Does NOT use the upstream Depot-hosted runners.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / SHA to build (defaults to the branch this workflow runs on).'
        required: false
        default: ''
      version:
        description: 'Version string baked into the binary (e.g. 2.4.15-ocean.1). Used to name the tarballs.'
        required: true
        default: '2.4.15-ocean.1'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg-target: linux-x64
    name: Package ${{ matrix.pkg-target }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust target
        run: |
          rustup target add ${{ matrix.target }}

      - name: Set jemalloc page size for linux-arm64
        if: matrix.pkg-target == 'linux-arm64'
        run: echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build -p biome_cli --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C strip=symbols -C codegen-units=1"
          BIOME_VERSION: ${{ inputs.version }}

      - name: Verify binary
        run: ./target/${{ matrix.target }}/release/biome --version

      - name: Assemble platform package
        run: |
          PKG_DIR=packages/@biomejs/cli-${{ matrix.pkg-target }}
          cp target/${{ matrix.target }}/release/biome "$PKG_DIR/biome"
          chmod +x "$PKG_DIR/biome"

          # Rewrite version + libc fields in the platform package manifest.
          node -e "
            const fs = require('fs');
            const path = '$PKG_DIR/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf-8'));
            pkg.version = '${{ inputs.version }}';
            const target = '${{ matrix.pkg-target }}';
            if (target.startsWith('linux-')) {
              pkg.libc = target.endsWith('musl') ? ['musl'] : ['glibc'];
            }
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
            console.log('Wrote', path);
          "

      - name: npm pack
        working-directory: packages/@biomejs/cli-${{ matrix.pkg-target }}
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.pkg-target }}
          path: packages/@biomejs/cli-${{ matrix.pkg-target }}/*.tgz
          if-no-files-found: error
