[package]
name                 = "biome_service"
version              = "0.0.0"
authors.workspace    = true
edition.workspace    = true
description          = "Biome's core functionality"
homepage.workspace   = true
repository.workspace = true
license.workspace    = true
keywords.workspace   = true
categories.workspace = true
publish              = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[package.metadata.cargo-udeps.ignore]
development = ["biome_service"]

[dependencies]
biome_analyze            = { workspace = true, features = ["serde"] }
biome_configuration      = { workspace = true, features = ["lang_json"] }
biome_console            = { workspace = true }
biome_css_analyze        = { workspace = true, optional = true }
biome_css_formatter      = { workspace = true, optional = true }
biome_css_parser         = { workspace = true, optional = true }
biome_css_semantic       = { workspace = true, optional = true }
biome_css_syntax         = { workspace = true, optional = true }
biome_db                 = { workspace = true }
biome_deserialize        = { workspace = true }
biome_diagnostics        = { workspace = true, features = ["camino"] }
biome_formatter          = { workspace = true, features = ["serde"] }
biome_fs                 = { workspace = true, features = ["serde"] }
biome_glob               = { workspace = true }
biome_graphql_analyze    = { workspace = true, optional = true }
biome_graphql_formatter  = { workspace = true, optional = true }
biome_graphql_parser     = { workspace = true, optional = true }
biome_graphql_syntax     = { workspace = true, optional = true }
biome_grit_formatter     = { workspace = true, optional = true }
biome_grit_parser        = { workspace = true, optional = true }
biome_grit_patterns      = { workspace = true, features = ["serde"], optional = true }
biome_grit_syntax        = { workspace = true, optional = true }
biome_html_analyze       = { workspace = true, optional = true }
biome_html_factory       = { workspace = true, optional = true }
biome_html_formatter     = { workspace = true, features = ["serde"], optional = true }
biome_html_parser        = { workspace = true, optional = true }
biome_html_syntax        = { workspace = true, optional = true }
biome_js_analyze         = { workspace = true, optional = true }
biome_js_factory         = { workspace = true, optional = true }
biome_js_formatter       = { workspace = true, features = ["serde"], optional = true }
biome_js_parser          = { workspace = true, optional = true }
biome_js_semantic        = { workspace = true, optional = true }
biome_js_syntax          = { workspace = true, optional = true }
biome_js_type_info       = { workspace = true, optional = true }
biome_json_analyze       = { workspace = true }
biome_json_formatter     = { workspace = true, features = ["serde"] }
biome_json_parser        = { workspace = true }
biome_json_syntax        = { workspace = true }
biome_languages          = { workspace = true, features = ["lang_json"] }
biome_markdown_formatter = { workspace = true, optional = true }
biome_markdown_parser    = { workspace = true, optional = true }
biome_markdown_syntax    = { workspace = true, optional = true }
biome_module_graph       = { workspace = true, features = ["serde"], optional = true }
biome_package            = { workspace = true }
biome_parser             = { workspace = true }
biome_plugin_loader      = { workspace = true, optional = true }
biome_project_layout     = { workspace = true }
biome_resolver           = { workspace = true }
biome_rowan              = { workspace = true, features = ["serde"] }
biome_string_case        = { workspace = true }
biome_text_edit          = { workspace = true }
biome_unicode_table      = { workspace = true }
biome_workspace_db       = { workspace = true }
biome_yaml_formatter     = { workspace = true, features = ["serde"], optional = true }
biome_yaml_parser        = { workspace = true, optional = true }
biome_yaml_syntax        = { workspace = true, optional = true }
bpaf                     = { workspace = true }
camino                   = { workspace = true }
crossbeam                = { workspace = true }
either                   = { workspace = true }
enumflags2               = { workspace = true, features = ["serde"] }
getrandom                = { workspace = true, features = ["js"] }
ignore                   = { workspace = true }
notify                   = { workspace = true, features = ["crossbeam-channel"] }
papaya                   = { workspace = true }
rayon                    = { workspace = true }
regex                    = { workspace = true }
rustc-hash               = { workspace = true }
salsa                    = { workspace = true }
schemars                 = { workspace = true, optional = true }
serde                    = { workspace = true, features = ["derive"] }
serde_json               = { workspace = true, features = ["raw_value"] }
smallvec                 = { workspace = true, features = ["serde"] }
tokio                    = { workspace = true, features = ["sync"] }
tracing                  = { workspace = true, features = ["attributes", "log"] }
web-time                 = { workspace = true }

[dev-dependencies]
biome_configuration = { path = "../biome_configuration", features = ["test-utils"] }
biome_service       = { path = ".", features = ["testing"] }
insta               = { workspace = true }

[features]
# To parse snippets and embeds inside HTML files
html_embeds    = ["biome_workspace_db/html_embeds", "lang_css", "lang_html", "lang_js", "lang_json"]
# JavaScript embeds
js_embeds      = ["lang_css", "lang_graphql", "lang_js"]
js_plugin      = ["biome_plugin_loader/js_plugin", "plugins"]
lang_css       = [
  "biome_configuration/lang_css",
  "biome_languages/lang_css",
  "dep:biome_css_analyze",
  "dep:biome_css_formatter",
  "dep:biome_css_parser",
  "dep:biome_css_semantic",
  "dep:biome_css_syntax"
]
lang_graphql   = [
  "biome_configuration/lang_graphql",
  "biome_languages/lang_graphql",
  "dep:biome_graphql_analyze",
  "dep:biome_graphql_formatter",
  "dep:biome_graphql_parser",
  "dep:biome_graphql_syntax"
]
lang_grit      = [
  "biome_languages/lang_grit",
  "dep:biome_grit_formatter",
  "dep:biome_grit_parser",
  "dep:biome_grit_patterns",
  "dep:biome_grit_syntax",
]
lang_html      = [
  "biome_configuration/lang_html",
  "biome_languages/lang_html",
  "dep:biome_html_analyze",
  "dep:biome_html_factory",
  "dep:biome_html_formatter",
  "dep:biome_html_parser",
  "dep:biome_html_syntax"
]
lang_js        = [
  "biome_configuration/lang_js",
  "biome_languages/lang_js",
  "dep:biome_js_analyze",
  "dep:biome_js_factory",
  "dep:biome_js_formatter",
  "dep:biome_js_parser",
  "dep:biome_js_semantic",
  "dep:biome_js_syntax",
]
lang_json      = [
  "biome_configuration/lang_json",
  "biome_languages/lang_json",
]
lang_md        = [
  "biome_configuration/lang_md",
  "biome_languages/lang_md",
  "dep:biome_markdown_formatter",
  "dep:biome_markdown_parser",
  "dep:biome_markdown_syntax"
]
lang_scss      = ["biome_css_syntax/scss"]
lang_yaml      = [
  "biome_configuration/lang_yaml",
  "biome_languages/lang_yaml",
  "dep:biome_yaml_formatter",
  "dep:biome_yaml_parser",
  "dep:biome_yaml_syntax"
]
# TODO does it need lang_js, lang_html and lang_css? To verify
module_graph   = ["biome_workspace_db/module_graph", "dep:biome_module_graph"]
plugins        = ["biome_configuration/plugins", "dep:biome_plugin_loader", "lang_grit"]
schema         = [
  "biome_configuration/schema",
  "biome_css_syntax/schema",
  "biome_formatter/schema",
  "biome_fs/schema",
  "biome_graphql_syntax/schema",
  "biome_grit_patterns/schema",
  "biome_grit_syntax/schema",
  "biome_html_formatter/schema",
  "biome_html_syntax/schema",
  "biome_js_analyze/schema",
  "biome_js_syntax/schema",
  "biome_json_syntax/schema",
  "biome_languages/schema",
  "biome_markdown_syntax/schema",
  "biome_module_graph/schema",
  "biome_text_edit/schema",
  "biome_yaml_formatter/schema",
  "biome_yaml_syntax/schema",
  "dep:schemars",
  "lang_css",
  # Enables file source schema generation
  "lang_graphql",
  "lang_grit",
  "lang_html",
  "lang_js",
  "lang_json",
  "module_graph",
  "type_inference"
]
# Features that are shipped by CLI, LSP and WASM
stable         = [
  "html_embeds",
  "js_embeds",
  "lang_css",
  "lang_graphql",
  "lang_js",
  "module_graph",
  "plugins",
  "type_inference"
]
testing        = []
# TODO does it needs lang_js ? to verify
type_inference = ["dep:biome_js_type_info", "lang_js", "module_graph"]

[lints]
workspace = true
