[package]
name                 = "biome_tailwind_analyze"
version              = "0.0.1"
authors.workspace    = true
edition.workspace    = true
description          = "Biome's Tailwind linter"
homepage.workspace   = true
repository.workspace = true
license.workspace    = true
keywords.workspace   = true
categories.workspace = true
publish              = true

[dependencies]
biome_analyze          = { workspace = true }
biome_analyze_macros   = { workspace = true }
biome_console          = { workspace = true }
biome_diagnostics      = { workspace = true }
biome_rowan            = { workspace = true }
biome_rule_options     = { workspace = true }
biome_suppression      = { workspace = true }
biome_tailwind_factory = { workspace = true }
biome_tailwind_parser  = { workspace = true }
biome_tailwind_syntax  = { workspace = true }
phf                    = { workspace = true }
schemars               = { workspace = true, optional = true }
serde                  = { workspace = true, features = ["derive"] }

[dev-dependencies]
biome_tailwind_parser = { workspace = true }
biome_test_utils      = { path = "../biome_test_utils" }
camino                = { workspace = true }
insta                 = { workspace = true, features = ["glob"] }
tests_macros          = { path = "../tests_macros" }

[build-dependencies]
filetime = { workspace = true }

[features]
schema = ["schemars"]

[lints]
workspace = true
