[package]
name                 = "biome_module_graph"
version              = "0.0.1"
authors.workspace    = true
edition.workspace    = true
description          = "Data structure for tracking inferred information across modules"
homepage.workspace   = true
repository.workspace = true
license.workspace    = true
keywords.workspace   = true
categories.workspace = true
publish              = true

[[bench]]
harness = false
name    = "module_graph"

[dependencies]
biome_console        = { workspace = true }
biome_css_semantic   = { workspace = true }
biome_css_syntax     = { workspace = true }
biome_diagnostics    = { workspace = true }
biome_formatter      = { workspace = true }
biome_fs             = { workspace = true }
biome_html_syntax    = { workspace = true }
biome_js_semantic    = { workspace = true }
biome_js_syntax      = { workspace = true }
biome_js_type_info   = { workspace = true }
biome_jsdoc_comment  = { workspace = true }
biome_package        = { workspace = true }
biome_project_layout = { workspace = true }
biome_resolver       = { workspace = true }
biome_rowan          = { workspace = true }
camino               = { workspace = true }
cfg-if               = { workspace = true }
indexmap             = { workspace = true }
once_cell            = "1.21.3"  # Use `std::sync::OnceLock::get_or_try_init` when it is stable.
papaya               = { workspace = true }
rustc-hash           = { workspace = true }
schemars             = { workspace = true, optional = true }
serde                = { workspace = true, optional = true }
serde_json           = { workspace = true }
static_assertions    = { workspace = true }

[dev-dependencies]
biome_configuration  = { path = "../biome_configuration" }
biome_css_formatter  = { path = "../biome_css_formatter" }
biome_css_parser     = { path = "../biome_css_parser" }
biome_deserialize    = { path = "../biome_deserialize" }
biome_html_formatter = { path = "../biome_html_formatter" }
biome_html_parser    = { path = "../biome_html_parser" }
biome_js_formatter   = { path = "../biome_js_formatter" }
biome_js_parser      = { path = "../biome_js_parser" }
biome_json_parser    = { path = "../biome_json_parser" }
biome_json_value     = { path = "../biome_json_value" }
biome_service        = { path = "../biome_service", features = ["testing"] }
biome_test_utils     = { path = "../biome_test_utils" }
divan                = { package = "codspeed-divan-compat", version = "=4.2.1" }
insta                = { workspace = true }
walkdir              = { workspace = true }

[target.'cfg(all(target_family="unix", not(all(target_arch = "aarch64", target_env = "musl"))))'.dev-dependencies]
tikv-jemallocator = { workspace = true }

[target.'cfg(target_os = "windows")'.dev-dependencies]
mimalloc = { workspace = true }

[features]
schema = ["dep:schemars"]
serde  = ["dep:serde"]

[lints]
workspace = true
