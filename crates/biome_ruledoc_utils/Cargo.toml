biome_json_syntax           = { workspace = true }
biome_languages             = { workspace = true, features = ["all"] }
biome_module_graph          = { workspace = true }
biome_project_layout        = { workspace = true }
biome_rowan                 = { workspace = true }
biome_service               = { workspace = true, features = ["lang_md", "lang_yaml"] }
biome_test_utils            = { workspace = true, features = ["lang_css", "lang_html", "lang_js", "module_graph"] }
