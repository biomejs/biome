[package]
name                 = "biome_grit_parser"
version              = "0.1.0"
authors.workspace    = true
edition.workspace    = true
description          = "Biome's GritQL parser"
homepage.workspace   = true
repository.workspace = true
license.workspace    = true
keywords.workspace   = true
categories.workspace = true
publish              = true

# cargo-workspaces metadata
[package.metadata.workspaces]
independent = true

[dependencies]
biome_grit_factory = { workspace = true }
biome_grit_syntax  = { workspace = true }
biome_parser       = { workspace = true }
biome_rowan        = { workspace = true }

[dev-dependencies]
biome_console     = { path = "../biome_console" }
biome_diagnostics = { path = "../biome_diagnostics" }
biome_test_utils  = { path = "../biome_test_utils" }
insta             = { workspace = true }
quickcheck_macros = { workspace = true }
tests_macros      = { workspace = true }

[features]
schemars = ["biome_grit_syntax/schema"]

[lints]
workspace = true
