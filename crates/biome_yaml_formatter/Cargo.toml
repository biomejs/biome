[package]
name                 = "biome_yaml_formatter"
version              = "0.1.0"
authors.workspace    = true
edition.workspace    = true
description          = "Biome's YAML formatter"
homepage.workspace   = true
repository.workspace = true
license.workspace    = true
keywords.workspace   = true
categories.workspace = true
publish              = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

# cargo-workspaces metadata
[package.metadata.workspaces]
independent = true

[dependencies]
biome_deserialize = { workspace = true }
biome_diagnostics = { workspace = true }
biome_formatter   = { workspace = true }
biome_rowan       = { workspace = true }
biome_suppression = { workspace = true }
biome_yaml_syntax = { workspace = true }

[dev-dependencies]
biome_configuration  = { path = "../biome_configuration/", features = ["lang_yaml"] }
biome_formatter      = { path = "../biome_formatter", features = ["countme"] }
biome_formatter_test = { path = "../biome_formatter_test", features = ["lang_yaml"] }
biome_languages      = { path = "../biome_languages", features = ["lang_yaml"] }
biome_parser         = { path = "../biome_parser" }
biome_service        = { path = "../biome_service", features = ["lang_yaml"] }
biome_yaml_parser    = { path = "../biome_yaml_parser" }
camino               = { workspace = true }
countme              = { workspace = true, features = ["enable"] }
serde             = { workspace = true, features = ["derive"] }
similar-asserts      = { workspace = true }
tests_macros         = { path = "../tests_macros" }

[lints]
workspace = true
