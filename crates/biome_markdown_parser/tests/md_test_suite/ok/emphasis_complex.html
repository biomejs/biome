<p>Nested: <strong>bold <em>and italic</em> text</strong></p>
<p>Overlapping: <em>foo<strong>bar</strong>baz</em></p>
<p>Rule of 3: <em><strong>bold italic</strong></em></p>
<p>Multiple runs: <em>a <strong>b</strong> c</em></p>
<p>Not emphasis: * not * emphasis *</p>
<p>Intraword: foo<em>bar</em>baz</p>
<p>Intraword underscore: foo_bar_baz</p>
