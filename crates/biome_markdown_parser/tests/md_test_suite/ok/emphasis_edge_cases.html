<p>Code spans block emphasis: <code>*not emphasis*</code></p>
<p>Escaped asterisks: *not emphasis*</p>
<p>HTML with asterisks: <span><em>between tags</em></span></p>
<p>HTML attribute: <span title="*not emphasis*">attr</span></p>
<p>Autolink: <a href="https://example.com/*not-emphasis*">https://example.com/*not-emphasis*</a></p>
<p>Link text: <a href="https://example.com"><em>emphasis</em></a></p>
<p>Reference link text: <a href="https://example.com"><em>emphasis</em></a></p>
<p>Image alt: <img src="https://example.com" alt="emphasis" /></p>
