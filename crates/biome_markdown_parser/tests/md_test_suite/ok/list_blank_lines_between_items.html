<h1>Blank lines between bullet items</h1>
<ul>
<li>
<p>foo</p>
</li>
<li>
<p>bar</p>
</li>
<li>
<p>baz</p>
</li>
</ul>
<h1>Blank lines between ordered items</h1>
<ol>
<li>
<p>first</p>
</li>
<li>
<p>second</p>
</li>
<li>
<p>third</p>
</li>
</ol>
<h1>Multiple blank lines between items</h1>
<ul>
<li>
<p>alpha</p>
</li>
<li>
<p>beta</p>
</li>
</ul>
<h1>Mixed: some items separated, some not</h1>
<ul>
<li>
<p>one</p>
</li>
<li>
<p>two</p>
</li>
<li>
<p>three</p>
</li>
</ul>
