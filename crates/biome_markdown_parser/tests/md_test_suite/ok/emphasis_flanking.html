<p>Valid emphasis: <em>italic</em> and <strong>bold</strong></p>
<p>Valid underscore: <em>italic</em> and <strong>bold</strong></p>
<p>Asterisk after space: foo * bar* should not be emphasis</p>
<p>Underscore intraword: foo_bar_baz (not emphasis)</p>
<p>Valid underscore at word boundary: <em>word</em></p>
<p>Mixed: foo <em>bar</em> baz</p>
