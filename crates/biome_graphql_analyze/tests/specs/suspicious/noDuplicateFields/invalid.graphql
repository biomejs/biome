query test($v: String, $t: String, $v: String) {
  id
}

query test {
  users(first: 100, after: 10, filter: "test", first: 50) {
    id
  }
}

query test {
  users {
    id
    name
    email
    name
  }
}

query test {
  users {
    id
    name
    email
    email: somethingElse
  }
}

# Fragment spread duplication (issue #9867)
fragment memberFields on Member {
  id
  firstName
  lastName
  age
}

query Member {
  member {
    ...memberFields
    firstName
  }
}
