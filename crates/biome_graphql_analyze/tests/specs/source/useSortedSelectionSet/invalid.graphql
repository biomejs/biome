# should generate diagnostics
query Member {
  member {
    firstName
    ...profileFields
    ...accountFields
    lastName
    ... on User {
      updatedAt
      createdAt
    }
    email
    ... on Address {
      street
      city
      zipCode
    }
  }
}

query AliasMember {
  member {
    firstName
    accountId: id
    email
  }
}

fragment memberFragment on Member {
  email
  ...contactFields
  lastName
  firstName
  ... on User {
    createdAt
  }
}