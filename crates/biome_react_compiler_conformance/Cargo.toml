# This crate is intentionally EXCLUDED from the Biome workspace (see the root
# `Cargo.toml` `[workspace].exclude`). It carries its own `Cargo.lock` so that
# the OXC oracle's modern dependency tree (oxc_parser 0.121 -> memchr >= 2.7.6,
# etc.) is resolved here in isolation instead of forcing ~200 version bumps onto
# Biome's main lockfile. It is a dev/CI conformance harness, not a shipped crate.
[package]
name    = "biome_react_compiler_conformance"
version = "0.0.0"
edition = "2021"
publish = false

[dependencies]
biome_js_parser      = { path = "../biome_js_parser" }
biome_js_semantic    = { path = "../biome_js_semantic" }
biome_js_syntax      = { path = "../biome_js_syntax" }
biome_rowan          = { path = "../biome_rowan" }
biome_react_compiler = { path = "../biome_react_compiler" }
react_compiler       = { git = "https://github.com/facebook/react", rev = "b49e04151e1c2cd34f4612e43c5e38edf5da56e2" }
react_compiler_ast   = { git = "https://github.com/facebook/react", rev = "b49e04151e1c2cd34f4612e43c5e38edf5da56e2" }
react_compiler_oxc   = { git = "https://github.com/facebook/react", rev = "b49e04151e1c2cd34f4612e43c5e38edf5da56e2" }
oxc_span             = "0.121"
oxc_allocator        = "0.121"
oxc_parser           = "0.121"
oxc_semantic         = "0.121"
