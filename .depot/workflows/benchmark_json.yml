# Depot CI Migration
# Source: .github/workflows/benchmark_json.yml
#
# No changes were necessary.

name: Benchmarks JSON
on:
  workflow_dispatch:
  merge_group:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
      - next
    paths:
      - 'Cargo.lock'
      - 'crates/biome_analyze/**/*.rs'
      - 'crates/biome_json_analyze/**/*.rs'
      - 'crates/biome_json_formatter/**/*.rs'
      - 'crates/biome_json_parser/**/*.rs'
      - 'crates/biome_json_*/**/*.rs'
      - 'crates/biome_formatter/**/*.rs'
      - 'crates/biome_rowan/**/*.rs'
      - 'crates/biome_parser/**/*.rs'
  push:
    branches:
      - main
      - next
    paths:
      - 'Cargo.lock'
      - 'crates/biome_analyze/**/*.rs'
      - 'crates/biome_json_analyze/**/*.rs'
      - 'crates/biome_json_formatter/**/*.rs'
      - 'crates/biome_json_parser/**/*.rs'
      - 'crates/biome_json_*/**/*.rs'
      - 'crates/biome_formatter/**/*.rs'
      - 'crates/biome_rowan/**/*.rs'
      - 'crates/biome_parser/**/*.rs'
env:
  RUST_LOG: info
jobs:
  bench:
    permissions:
      contents: read
      pull-requests: write
    name: Bench
    runs-on:
      size: 16x64
      image: l74wrh0kdk.registry.depot.dev/bench:latest
    strategy:
      matrix:
        package:
          - biome_json_parser
          - biome_json_formatter
          - biome_json_analyze
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Compile
        timeout-minutes: 20
        run: cargo codspeed build -p ${{ matrix.package }}
        env:
          CARGO_BUILD_JOBS: 3 # Default is 4 (equals to the vCPU count of the runner), which leads OOM on cargo build
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@4deb3275dd364fb96fb074c953133d29ec96f80f # v4.10.6
        timeout-minutes: 50
        with:
          mode: simulation
          run: cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}
